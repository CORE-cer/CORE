name: Test Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  run-basic-tests-debug:
    strategy:
      matrix:
        compiler_profile: [clang-libstdcxx, gcc-libstdcxx]
        include:
          - compiler_profile: clang-libstdcxx
            check_name: x86_64-linux-clang-libstdc
          - compiler_profile: gcc-libstdcxx
            check_name: x86_64-linux-gcc-libstdc
    name: run-basic-tests-debug (${{ matrix.check_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        run: |
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "$GITHUB_ENV"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "$GITHUB_ENV"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Install libtinfo5 for clang
        run: |
          sudo apt update
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Set up GCC
        run: |
          sudo apt install gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 60 --slave /usr/bin/g++ g++ /usr/bin/g++-14 && sudo update-alternatives --config gcc

      - name: Check versions
        run: |
          clang --version
          clang-format --version
          gcc -v

      - name: Install vcpkg system dependencies
        run: sudo apt install -y curl zip unzip tar pkg-config autoconf automake libtool

      - name: Install dependencies
        run: chmod +x ./scripts/install_dependencies.sh && ./scripts/install_dependencies.sh

      - name: base build
        run: chmod +x ./scripts/build.sh && ./scripts/build.sh -b Debug -c ${{ matrix.compiler_profile }}

      - name: build with grammar
        run: chmod +x ./scripts/build_grammar.sh && ./scripts/build_grammar.sh -b Debug -c ${{ matrix.compiler_profile }}

      - name: run tests
        run: chmod +x ./scripts/build_and_test.sh && ./scripts/build_and_test.sh -b Debug -c ${{ matrix.compiler_profile }}

  run-sanitizer-tests-debug:
    strategy:
      matrix:
        compiler_profile: [clang-libstdcxx]
        include:
          - compiler_profile: clang-libstdcxx
            check_name: x86_64-linux-clang-libstdc
    name: run-sanitizer-tests-debug (${{ matrix.check_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        run: |
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "$GITHUB_ENV"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "$GITHUB_ENV"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Install libtinfo5 for clang
        run: |
          sudo apt update
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Set up GCC
        run: |
          sudo apt install gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 60 --slave /usr/bin/g++ g++ /usr/bin/g++-14 && sudo update-alternatives --config gcc

      - name: Check versions
        run: |
          clang --version
          clang-format --version
          gcc -v

      - name: Install vcpkg system dependencies
        run: sudo apt install -y curl zip unzip tar pkg-config autoconf automake libtool

      - name: Install dependencies
        run: chmod +x ./scripts/install_dependencies.sh && ./scripts/install_dependencies.sh

      - name: base build
        run: chmod +x ./scripts/build.sh && ./scripts/build.sh -b Debug -c ${{ matrix.compiler_profile }}

      - name: build with grammar
        run: chmod +x ./scripts/build_grammar.sh && ./scripts/build_grammar.sh -b Debug -c ${{ matrix.compiler_profile }}

      - name: run tests with address sanitizer
        run: chmod +x ./scripts/build_and_test.sh && ./scripts/build_and_test.sh -b Debug -s address -c ${{ matrix.compiler_profile }}

      - name: run tests with thread sanitizer
        run: chmod +x ./scripts/build_and_test.sh && ./scripts/build_and_test.sh -b Debug -s thread -c ${{ matrix.compiler_profile }}

  run-address-sanitizer-tests-release:
    strategy:
      matrix:
        compiler_profile: [clang-libstdcxx]
        include:
          - compiler_profile: clang-libstdcxx
            check_name: x86_64-linux-clang-libstdc
    name: run-address-sanitizer-tests-release (${{ matrix.check_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        run: |
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "$GITHUB_ENV"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "$GITHUB_ENV"

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Install libtinfo5 for clang
        run: |
          sudo apt update
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Set up GCC
        run: |
          sudo apt install gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 60 --slave /usr/bin/g++ g++ /usr/bin/g++-14 && sudo update-alternatives --config gcc

      - name: Check versions
        run: |
          clang --version
          clang-format --version
          gcc -v

      - name: Install vcpkg system dependencies
        run: sudo apt install -y curl zip unzip tar pkg-config autoconf automake libtool

      - name: Install dependencies
        run: chmod +x ./scripts/install_dependencies.sh && ./scripts/install_dependencies.sh

      - name: base build
        run: chmod +x ./scripts/build.sh && ./scripts/build.sh -b Release -s address -c ${{ matrix.compiler_profile }}

      - name: build with grammar
        run: chmod +x ./scripts/build_grammar.sh && ./scripts/build_grammar.sh -b Release -s address -c ${{ matrix.compiler_profile }}

      - name: run tests with address sanitizer
        run: chmod +x ./scripts/build_and_test.sh && ./scripts/build_and_test.sh -b Release -s address -c ${{ matrix.compiler_profile }}

  run-address-sanitizer-e2e-release:
    strategy:
      matrix:
        compiler_profile: [clang-libstdcxx]
        include:
          - compiler_profile: clang-libstdcxx
            check_name: x86_64-linux-clang-libstdc
    name: run-address-sanitizer-e2e-release (${{ matrix.check_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        run: |
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "$GITHUB_ENV"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@v7.3.0

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Install libtinfo5 for clang
        run: |
          sudo apt update
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Set up GCC
        run: |
          sudo apt install gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 60 --slave /usr/bin/g++ g++ /usr/bin/g++-14 && sudo update-alternatives --config gcc

      - name: Install vcpkg system dependencies
        run: sudo apt install -y curl zip unzip tar pkg-config autoconf automake libtool

      - name: Install dependencies
        run: chmod +x ./scripts/install_dependencies.sh && ./scripts/install_dependencies.sh

      - name: Build pycer with address sanitizer
        run: chmod +x ./scripts/build_pycer.sh && ./scripts/build_pycer.sh -s address -b RelWithDebInfo

      - name: Run e2e tests with address sanitizer
        run: LD_PRELOAD=$(find $(clang -print-resource-dir) \( -name "libclang_rt.asan-x86_64.so" -o -name "libclang_rt.asan.so" \) | head -1) .venv/bin/pytest tests/e2e/ -v --server-mode offline -k "q1_ or q10_"
        env:
          ASAN_OPTIONS: suppressions=asan_suppressions.txt
          LSAN_OPTIONS: suppressions=lsan_suppressions.txt

      - name: Run online e2e tests with address sanitizer
        run: LD_PRELOAD=$(find $(clang -print-resource-dir) \( -name "libclang_rt.asan-x86_64.so" -o -name "libclang_rt.asan.so" \) | head -1) .venv/bin/pytest tests/e2e/ -v -s --server-mode online -k "bluesky"
        env:
          ASAN_OPTIONS: suppressions=asan_suppressions.txt
          LSAN_OPTIONS: suppressions=lsan_suppressions.txt

  run-thread-sanitizer-tests-release:
    strategy:
      matrix:
        compiler_profile: [clang-libstdcxx]
        include:
          - compiler_profile: clang-libstdcxx
            check_name: x86_64-linux-clang-libstdc
    name: run-thread-sanitizer-tests-release (${{ matrix.check_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        run: |
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "$GITHUB_ENV"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "$GITHUB_ENV"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-${{ matrix.os }}
          create-symlink: true

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Install libtinfo5 for clang
        run: |
          sudo apt update
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Set up GCC
        run: |
          sudo apt install gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 60 --slave /usr/bin/g++ g++ /usr/bin/g++-14 && sudo update-alternatives --config gcc

      - name: Check versions
        run: |
          clang --version
          clang-format --version
          gcc -v

      - name: Install vcpkg system dependencies
        run: sudo apt install -y curl zip unzip tar pkg-config autoconf automake libtool

      - name: Install dependencies
        run: chmod +x ./scripts/install_dependencies.sh && ./scripts/install_dependencies.sh

      - name: base build
        run: chmod +x ./scripts/build.sh && ./scripts/build.sh -b Release -s thread -c ${{ matrix.compiler_profile }}

      - name: build with grammar
        run: chmod +x ./scripts/build_grammar.sh && ./scripts/build_grammar.sh -b Release -s thread -c ${{ matrix.compiler_profile }}

      - name: run tests with thread sanitizer
        run: chmod +x ./scripts/build_and_test.sh && ./scripts/build_and_test.sh -b Release -s thread -c ${{ matrix.compiler_profile }}

  run-thread-sanitizer-e2e-release:
    strategy:
      matrix:
        compiler_profile: [clang-libstdcxx]
        include:
          - compiler_profile: clang-libstdcxx
            check_name: x86_64-linux-clang-libstdc
    name: run-thread-sanitizer-e2e-release (${{ matrix.check_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        run: |
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "$GITHUB_ENV"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@v7.3.0

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Install libtinfo5 for clang
        run: |
          sudo apt update
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Set up GCC
        run: |
          sudo apt install gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 60 --slave /usr/bin/g++ g++ /usr/bin/g++-14 && sudo update-alternatives --config gcc

      - name: Install vcpkg system dependencies
        run: sudo apt install -y curl zip unzip tar pkg-config autoconf automake libtool

      - name: Install dependencies
        run: chmod +x ./scripts/install_dependencies.sh && ./scripts/install_dependencies.sh

      - name: Build pycer with thread sanitizer
        run: chmod +x ./scripts/build_pycer.sh && ./scripts/build_pycer.sh -s thread -b RelWithDebInfo

      - name: Run e2e tests with thread sanitizer
        run: LD_PRELOAD=$(find $(clang -print-resource-dir) \( -name "libclang_rt.tsan-x86_64.so" -o -name "libclang_rt.tsan.so" \) | head -1) .venv/bin/pytest tests/e2e/ -v --server-mode offline -k "q1_ or q10_"
        env:
          TSAN_OPTIONS: suppressions=tsan_suppressions.txt

      - name: Run online e2e tests with thread sanitizer
        run: LD_PRELOAD=$(find $(clang -print-resource-dir) \( -name "libclang_rt.tsan-x86_64.so" -o -name "libclang_rt.tsan.so" \) | head -1) .venv/bin/pytest tests/e2e/ -v -s --server-mode online -k "bluesky"
        env:
          TSAN_OPTIONS: suppressions=tsan_suppressions.txt

  run-tests-release:
    strategy:
      matrix:
        compiler_profile: [clang-libstdcxx, gcc-libstdcxx]
        include:
          - compiler_profile: clang-libstdcxx
            check_name: x86_64-linux-clang-libstdc
          - compiler_profile: gcc-libstdcxx
            check_name: x86_64-linux-gcc-libstdc
    name: run-tests-release (${{ matrix.check_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        run: |
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "$GITHUB_ENV"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "$GITHUB_ENV"

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-${{ matrix.os }}
          create-symlink: true

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Install libtinfo5 for clang
        run: |
          sudo apt update
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Set up GCC
        run: |
          sudo apt install gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 60 --slave /usr/bin/g++ g++ /usr/bin/g++-14 && sudo update-alternatives --config gcc

      - name: Check versions
        run: |
          clang --version
          clang-format --version
          gcc -v

      - name: Install vcpkg system dependencies
        run: sudo apt install -y curl zip unzip tar pkg-config autoconf automake libtool

      - name: Install dependencies
        run: chmod +x ./scripts/install_dependencies.sh && ./scripts/install_dependencies.sh

      - name: base build
        run: chmod +x ./scripts/build.sh && ./scripts/build.sh -b Release -c ${{ matrix.compiler_profile }}

      - name: build with grammar
        run: chmod +x ./scripts/build_grammar.sh && ./scripts/build_grammar.sh -b Release -c ${{ matrix.compiler_profile }}

      - name: run tests
        run: chmod +x ./scripts/build_and_test.sh && ./scripts/build_and_test.sh -b Release -c ${{ matrix.compiler_profile }}

      # Integration query tests are now run via pycer e2e tests in the build-pycer job

  build-pycer:
    strategy:
      matrix:
        compiler_profile: [clang-libstdcxx, gcc-libstdcxx]
        include:
          - compiler_profile: clang-libstdcxx
            check_name: x86_64-linux-clang-libstdc
            build_config_settings: >-
              --config-settings=cmake.define.VCPKG_TARGET_TRIPLET=x64-linux-clang-libstdcxx
              --config-settings=cmake.define.CMAKE_C_COMPILER=clang
              --config-settings=cmake.define.CMAKE_CXX_COMPILER=clang++
              --config-settings=cmake.define.CMAKE_CXX_FLAGS=-stdlib=libstdc++
          - compiler_profile: gcc-libstdcxx
            check_name: x86_64-linux-gcc-libstdc
            build_config_settings: >-
              --config-settings=cmake.define.VCPKG_TARGET_TRIPLET=x64-linux-gcc-libstdcxx
              --config-settings=cmake.define.CMAKE_C_COMPILER=gcc
              --config-settings=cmake.define.CMAKE_CXX_COMPILER=g++
    name: build-pycer (${{ matrix.check_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        run: |
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> "$GITHUB_ENV"
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> "$GITHUB_ENV"

      - uses: astral-sh/setup-uv@v7.3.0

      - name: Install LLVM and Clang
        uses: KyleMayes/install-llvm-action@v2.0.9
        with:
          version: "21.1.8"

      - name: Install libtinfo5 for clang
        run: |
          sudo apt update
          wget http://security.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.1_amd64.deb
          sudo apt install ./libtinfo5_6.3-2ubuntu0.1_amd64.deb

      - name: Set up GCC
        run: |
          sudo apt install gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 60 --slave /usr/bin/g++ g++ /usr/bin/g++-14 && sudo update-alternatives --config gcc

      - name: Install vcpkg system dependencies
        run: sudo apt install -y curl zip unzip tar pkg-config autoconf automake libtool

      - name: Install dependencies
        run: chmod +x ./scripts/install_dependencies.sh && ./scripts/install_dependencies.sh

      - name: Build pycer wheel
        run: uv build --wheel ${{ matrix.build_config_settings }}

      - name: Verify pycer import
        run: uv run python -c "import pycer; print('pycer loaded successfully')"

      - name: Run e2e integration tests
        run: uv run pytest tests/e2e/ -v --server-mode offline
