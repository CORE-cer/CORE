name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true

permissions:
  contents: read
  id-token: write

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Export GitHub Actions cache variables
        run: |
          echo "ACTIONS_CACHE_URL=${ACTIONS_CACHE_URL}" >> $GITHUB_ENV
          echo "ACTIONS_RUNTIME_TOKEN=${ACTIONS_RUNTIME_TOKEN}" >> $GITHUB_ENV

      - uses: actions/setup-python@v5

      - name: Set version
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = \"0.0.0\"/version = \"${VERSION}\"/" pyproject.toml

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD: "cp313-manylinux_x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: >-
            dnf install -y epel-release &&
            dnf install -y clang gcc-c++ ninja-build git curl zip unzip tar
            pkg-config autoconf automake libtool &&
            cd {package} &&
            chmod +x ./scripts/install_dependencies.sh &&
            ./scripts/install_dependencies.sh
          CIBW_ENVIRONMENT_PASS_LINUX: "ACTIONS_CACHE_URL ACTIONS_RUNTIME_TOKEN VCPKG_BINARY_SOURCES"
          CIBW_TEST_COMMAND: >-
            python -c "import pycer; print('pycer loaded successfully')"

      - uses: actions/upload-artifact@v4
        with:
          name: pycer-wheel
          path: ./wheelhouse/*.whl

  publish:
    needs: build-wheel
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pycer-wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
